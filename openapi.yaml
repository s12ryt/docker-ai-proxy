openapi: 3.0.3
info:
  title: AI Hub API
  version: 1.0.0
  description: >-
    Multi-protocol AI gateway for OpenAI-compatible, Anthropic, and Gemini
    chat APIs, plus OpenAI-compatible Responses, embeddings, completions,
    images, and audio pass-through endpoints.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      summary: Public health check
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  version:
                    type: string
                  uptime:
                    type: string
  /v1/models:
    get:
      summary: List enabled models
      responses:
        '200':
          description: OpenAI-compatible model list
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Model'
  /v1/chat/completions:
    post:
      summary: OpenAI-compatible chat completions ingress
      description: Routes to OpenAI-compatible providers directly or translates to Anthropic/Gemini upstream protocols.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              additionalProperties: true
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                stream:
                  type: boolean
      responses:
        '200':
          description: OpenAI chat completion or SSE stream
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/messages:
    post:
      summary: Anthropic Messages ingress
      description: Accepts Anthropic-native requests and translates to the selected upstream provider when necessary.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              additionalProperties: true
              properties:
                model:
                  type: string
                max_tokens:
                  type: integer
                stream:
                  type: boolean
                messages:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
      responses:
        '200':
          description: Anthropic message or event stream
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1beta/models/{model}:generateContent:
    post:
      summary: Gemini generateContent ingress
      parameters:
        - name: model
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Gemini response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1beta/models/{model}:streamGenerateContent:
    post:
      summary: Gemini streamGenerateContent ingress
      parameters:
        - name: model
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Gemini SSE stream
          content:
            text/event-stream:
              schema:
                type: string
  /v1/responses:
    post:
      summary: OpenAI Responses API pass-through
      description: OpenAI-compatible providers only; supports raw SSE pass-through.
      requestBody:
        $ref: '#/components/requestBodies/GenericJSON'
      responses:
        '200':
          $ref: '#/components/responses/GenericJSONOrSSE'
        '501':
          $ref: '#/components/responses/NotImplemented'
  /v1/embeddings:
    post:
      summary: OpenAI embeddings pass-through
      description: OpenAI-compatible providers only.
      requestBody:
        $ref: '#/components/requestBodies/GenericJSON'
      responses:
        '200':
          $ref: '#/components/responses/GenericJSON'
        '501':
          $ref: '#/components/responses/NotImplemented'
  /v1/completions:
    post:
      summary: OpenAI legacy completions pass-through
      description: OpenAI-compatible providers only; supports raw SSE pass-through.
      requestBody:
        $ref: '#/components/requestBodies/GenericJSON'
      responses:
        '200':
          $ref: '#/components/responses/GenericJSONOrSSE'
        '501':
          $ref: '#/components/responses/NotImplemented'
  /v1/images/{operation}:
    post:
      summary: OpenAI images pass-through
      description: OpenAI-compatible providers only. The operation path segment is forwarded to the upstream provider.
      parameters:
        - name: operation
          in: path
          required: true
          schema:
            type: string
            example: generations
      requestBody:
        $ref: '#/components/requestBodies/GenericJSON'
      responses:
        '200':
          $ref: '#/components/responses/GenericJSON'
        '501':
          $ref: '#/components/responses/NotImplemented'
  /v1/audio/{operation}:
    post:
      summary: OpenAI audio pass-through
      description: OpenAI-compatible providers only. Supports JSON and multipart/form-data request bodies.
      parameters:
        - name: operation
          in: path
          required: true
          schema:
            type: string
            example: transcriptions
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
          multipart/form-data:
            schema:
              type: object
              required: [model]
              additionalProperties: true
              properties:
                model:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
          $ref: '#/components/responses/GenericJSON'
        '501':
          $ref: '#/components/responses/NotImplemented'
  /api/auth/bootstrap:
    get:
      summary: Check first-admin bootstrap status
      security: []
      responses:
        '200':
          description: Bootstrap status
          content:
            application/json:
              schema:
                type: object
                properties:
                  bootstrap_required:
                    type: boolean
  /api/auth/register:
    post:
      summary: Create the initial admin or register a user as admin
      security:
        - adminSessionCookie: []
        - adminBearerAuth: []
        - adminQueryToken: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
                  minLength: 8
                role:
                  type: string
                  enum: [admin, user]
      responses:
        '200':
          description: Registered user; first admin also receives session cookie
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Initial admin already exists
        '415':
          description: JSON content type required
  /api/auth/login:
    post:
      summary: Login with username and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login status and user profile
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '415':
          description: JSON content type required
  /api/auth/logout:
    post:
      summary: Logout and clear the session cookie
      security:
        - adminSessionCookie: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Logout status
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Origin or Referer rejected
        '415':
          description: JSON content type required
  /api/auth/profile:
    get:
      summary: Get current logged-in user profile
      security:
        - adminSessionCookie: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/PublicUser'
                  bootstrap_required:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/summary:
    get:
      summary: Aggregate call summary
      security:
        - adminSessionCookie: []
        - adminBearerAuth: []
        - adminQueryToken: []
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 720
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/providers:
    get:
      summary: Provider configuration without API keys
      security:
        - adminSessionCookie: []
        - adminBearerAuth: []
        - adminQueryToken: []
      responses:
        '200':
          description: Providers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
    put:
      summary: Replace provider configuration
      description: Requires application/json. Cookie-authenticated browser requests must include same-origin Origin or Referer.
      security:
        - adminSessionCookie: []
        - adminBearerAuth: []
        - adminQueryToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                additionalProperties: true
      responses:
        '200':
          description: Updated providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  providers:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Origin or Referer rejected
        '415':
          description: JSON content type required
  /api/access-tokens:
    get:
      summary: Access token configuration
      security:
        - adminSessionCookie: []
        - adminBearerAuth: []
        - adminQueryToken: []
      responses:
        '200':
          description: Access token list and config metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
                  config_path:
                    type: string
                  env_overridden:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      summary: Replace access token configuration
      description: Requires application/json. An empty token list is allowed and makes /v1/* fail closed with 401. Cookie-authenticated browser requests must include same-origin Origin or Referer.
      security:
        - adminSessionCookie: []
        - adminBearerAuth: []
        - adminQueryToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tokens]
              properties:
                tokens:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated access token configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  count:
                    type: integer
                  config_path:
                    type: string
                  env_overridden:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Origin or Referer rejected
        '415':
          description: JSON content type required
  /api/clients:
    get:
      summary: Client configuration
      description: Lists named downstream Clients used for /v1/* bearer authentication and policy enforcement.
      security:
        - adminSessionCookie: []
        - adminBearerAuth: []
        - adminQueryToken: []
      responses:
        '200':
          description: Client list and config metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  clients:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        token:
                          type: string
                        enabled:
                          type: boolean
                        daily_limit:
                          type: integer
                          description: UTC daily request limit. Zero means unlimited.
                        allowed_models:
                          type: array
                          description: Empty means all models are allowed.
                          items:
                            type: string
                        note:
                          type: string
                        created_at:
                          type: string
                  count:
                    type: integer
                  config_path:
                    type: string
                  env_overridden:
                    type: boolean
                  legacy_token_count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      summary: Replace client configuration
      description: Requires application/json. Disabled clients are rejected by /v1/*, daily_limit is enforced per UTC day, and allowed_models restricts usable models and filters /v1/models. Cookie-authenticated browser requests must include same-origin Origin or Referer.
      security:
        - adminSessionCookie: []
        - adminBearerAuth: []
        - adminQueryToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clients]
              properties:
                clients:
                  type: array
                  items:
                    type: object
                    required: [name, token]
                    properties:
                      name:
                        type: string
                      token:
                        type: string
                      enabled:
                        type: boolean
                      daily_limit:
                        type: integer
                        description: UTC daily request limit. Zero means unlimited.
                      allowed_models:
                        type: array
                        description: Empty means all models are allowed.
                        items:
                          type: string
                      note:
                        type: string
                      created_at:
                        type: string
      responses:
        '200':
          description: Updated client configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  count:
                    type: integer
                  config_path:
                    type: string
                  env_overridden:
                    type: boolean
                  legacy_token_count:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Origin or Referer rejected
        '415':
          description: JSON content type required
  /api/recent:
    get:
      summary: Recent calls
      security:
        - adminSessionCookie: []
        - adminBearerAuth: []
        - adminQueryToken: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        '200':
          description: Recent call records
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
  /api/runtime:
    get:
      summary: Runtime and DB pool stats
      security:
        - adminSessionCookie: []
        - adminBearerAuth: []
        - adminQueryToken: []
      responses:
        '200':
          description: Runtime stats
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/reload:
    post:
      summary: Reload config.json
      security:
        - adminSessionCookie: []
        - adminBearerAuth: []
        - adminQueryToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Reload status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '403':
          description: Origin or Referer rejected
        '405':
          description: Method not allowed
        '415':
          description: JSON content type required
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Required client access token from ACCESS_TOKENS for all model proxy endpoints. Requests fail closed with 401 when no client token is configured.
    adminBearerAuth:
      type: http
      scheme: bearer
      description: Legacy admin token from ADMIN_TOKEN.
    adminQueryToken:
      type: apiKey
      in: query
      name: admin_token
      description: Legacy admin token query parameter for scripts and compatibility.
    adminSessionCookie:
      type: apiKey
      in: cookie
      name: ai_hub_session
      description: HttpOnly management session cookie issued by /api/auth/login or first-admin registration.
  requestBodies:
    GenericJSON:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [model]
            additionalProperties: true
            properties:
              model:
                type: string
              stream:
                type: boolean
  responses:
    GenericJSON:
      description: JSON response
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    GenericJSONOrSSE:
      description: JSON response or SSE stream
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
        text/event-stream:
          schema:
            type: string
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Unauthorized
      content:
        text/plain:
          schema:
            type: string
    NotImplemented:
      description: Provider/protocol combination is not implemented
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    AuthResponse:
      type: object
      properties:
        ok:
          type: boolean
        user:
          $ref: '#/components/schemas/PublicUser'
    PublicUser:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        role:
          type: string
          enum: [admin, user]
        disabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true
    Model:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: model
        owned_by:
          type: string
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            type:
              type: string
            code:
              oneOf:
                - type: string
                - type: integer
